project_id = "qa3"

[api]
port = 54331
external_url = "http://127.0.0.1:54331"

[auth]
enabled = true
site_url = "http://localhost:3005"
additional_redirect_urls = ["http://localhost:3005/*", "http://127.0.0.1:3005/*"]
email.enable_confirmations = false
# Lokal dev üçün uzun müddətli token — restart zamanı refresh loop spam-ını azaldır
jwt_expiry = 86400

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
# Google requires https for redirect urls normally, but local supabase handles it.
# redirect_uri = "http://localhost:54321/auth/v1/callback"

[db]
port = 54332

[studio]
port = 54333

[inbucket]
